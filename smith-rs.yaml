setting:
  log_file_path: "smith-rs.log"
  pid_file_path: "smith-rs.pid"
  debug: true

system:
  hostname: "localhost"

email:
  smtp_server: "smtp.example.com"
  smtp_port: 465
  sender_email: "alerts@example.com"
  smtp_username: "user"
  smtp_password: "pass"

timeperiods:
  - name: "24x7"
    alias: "24 Hours A Day, 7 Days A Week"
    sunday: "00:00-24:00"
    monday: "00:00-24:00"
    tuesday: "00:00-24:00"
    wednesday: "00:00-24:00"
    thursday: "00:00-24:00"
    friday: "00:00-24:00"
    saturday: "00:00-24:00"

  - name: "work_hours"
    alias: "Work Hours"
    monday: "09:00-17:00"
    tuesday: "09:00-17:00"
    wednesday: "09:00-17:00"
    thursday: "09:00-17:00"
    friday: "09:00-17:00"

contacts:
  - name: "john_smith"
    alias: "John Smith"
    email: "john.smiths@matrix.gov"
    notification_period: "work_hours"
    notification_options: ["w", "u", "c", "r"]

services:
  - name: "load"
    description: "Load Average"
    active: true
    check_interval: 10
    check_attempts: 3
    check_time_period: "24x7"
    warning: 16
    critical: 24

  - name: "memory"
    description: "Memory Usage"
    active: true
    check_interval: 15
    check_attempts: 3
    check_time_period: "24x7"
    warning: 85
    critical: 95

  - name: "swap"
    description: "Swap Space Utilization"
    active: true
    check_interval: 30
    check_attempts: 3
    check_time_period: "24x7"
    warning: 40.0
    critical: 70.0

  - name: "iowait"
    description: "I/O Wait Check"
    active: false
    check_interval: 15
    check_attempts: 3
    check_time_period: "24x7"
    warning: 15.0
    critical: 30.0

  - name: "disk"
    description: "Disk Space"
    active: true
    check_interval: 60
    check_attempts: 2
    check_time_period: "24x7"
    warning: 90
    critical: 95
    disks: ["/", "/System/Volumes/Data"]

  - name: "inodes"
    description: "Inode Utilization Check"
    active: true
    check_interval: 60
    check_attempts: 2
    check_time_period: "24x7"
    warning: 80.0
    critical: 90.0
    disks: ["/", "/System/Volumes/Data"]

  - name: "iops"
    description: "Input/Output Operations Per Second"
    active: true
    check_interval: 15
    check_attempts: 3
    check_time_period: "24x7"
    warning: 1500.0   # Alert if total IOPS exceed 1500 ops/sec
    critical: 3000.0  # Alert if total IOPS exceed 3000 ops/sec
    disks: ["sda", "sdb"]

  - name: "ntp"
    description: "NTP Drift"
    active: true
    check_interval: 120
    check_attempts: 3
    check_time_period: "24x7"
    warning: 1
    critical: 3
    ntp_pool_server: "pool.ntp.org"
